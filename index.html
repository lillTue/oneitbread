<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brød-planen | Hverdage</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #f3f3f3;
            --today-bg: #fffbe6;
            --border: #eeeeee;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .wrapper {
            width: 100%;
            max-width: 400px;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .week-label {
            font-size: 0.8rem;
            color: #888;
            margin: 20px 0 10px 5px;
            font-weight: 600;
        }

        .list {
            border-top: 1px solid var(--border);
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .row:hover {
            background-color: var(--accent);
        }

        .date {
            font-size: 0.9rem;
            color: #666;
            flex: 1;
        }

        .name {
            font-weight: 500;
            flex: 1;
            text-align: right;
        }

        /* Markering af i dag */
        .today {
            background-color: var(--today-bg);
            border-left: 4px solid #ffd43b;
        }

        .weekend-divider {
            height: 20px;
            background: #fafafa;
            border-bottom: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>Morgenbrød 🥐</h1>
    </header>

    <div class="week-label">UGE 1</div>
    <div class="list">
        <div class="row today">
            <span class="date">Mandag</span>
            <span class="name">Morten (I dag)</span>
        </div>
        <div class="row">
            <span class="date">Tirsdag</span>
            <span class="name">Line</span>
        </div>
        <div class="row">
            <span class="date">Onsdag</span>
            <span class="name">Anders</span>
        </div>

            <span class="name">M
