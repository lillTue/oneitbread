<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brød-planen</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            line-height: 1.6;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        th {
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .next-up {
            background-color: #fff9db; /* Svag markering af den næste person */
            font-weight: bold;
        }
        .status {
            font-size: 0.8rem;
            color: #2b8a3e;
            background: #ebfbee;
            padding: 2px 8px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Brød-planen 🥐</h1>
    <table>
        <thead>
            <tr>
                <th>Dato</th>
                <th>Ansvarlig</th>
            </tr>
        </thead>
        <tbody>
            <tr class="next-up">
                <td>Fredag 20. marts</td>
                <td>Morten <span class="status">Næste</span></td>
            </tr>
            <tr>
                <td>Fredag 27. marts</td>
                <td>Line</td>
            </tr>
            <tr>
                <td>Fredag 3. april</td>
                <td>Anders</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
